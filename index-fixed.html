<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Iframe with Remote Control</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #main-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        #iframe-container {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        #qr-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            background: #1a1a1a;
            padding: 15px 20px;
            gap: 20px;
            color: white;
            box-sizing: border-box;
            width: 100%;
            border-top: 1px solid #333;
            transition: all 0.3s ease;
        }
        .qr-text-block {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .qr-text-block h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
            font-weight: 600;
        }
        .qr-text-block p {
            margin: 0;
            font-size: 13px;
            color: #ccc;
            line-height: 1.4;
        }
        #qr-code {
            background: #fff;
            padding: 8px;
            border-radius: 6px;
            transition: opacity 0.3s ease, transform 0.3s ease;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        #qr-code canvas, #qr-code img {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: auto;
            display: block;
        }
        #qr-code.hidden {
            display: none;
        }
        #qr-toggle {
            padding: 10px 16px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        #qr-toggle:hover {
            background: #444;
        }
        
        /* Mobile responsive adjustments */
        @media (max-width: 600px) {
            #qr-container {
                flex-wrap: wrap;
                padding: 12px;
                gap: 12px;
            }
            #qr-code {
                width: 80px;
                height: 80px;
                padding: 6px;
            }
            .qr-text-block {
                min-width: calc(100% - 100px); /* 80px + 12px gap + some buffer */
            }
            .qr-text-block h3 {
                font-size: 15px;
                margin-bottom: 3px;
            }
            .qr-text-block p {
                font-size: 12px;
            }
            #qr-toggle {
                width: 100%;
                padding: 10px;
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>

<div id="main-wrapper">
    <div id="iframe-container">
        <iframe 
            id="camp_frame"
            src=""
            data-breakpoint="4000"
            style="border: none;">
        </iframe>
    </div>

    <!-- QR Code Bottom Bar -->
    <div id="qr-container">
        <div id="qr-code"></div>
        <div class="qr-text-block" id="qr-text">
            <h3>Remote Control</h3>
            <p>Scan this QR code with your mobile device to remotely control the layout.</p>
        </div>
        <button id="qr-toggle">Hide Remote Control</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    // Parse URL parameters
    var urlParams = new URLSearchParams(window.location.search);
    var campId = urlParams.get('campId') || '13849';
    var uuid = urlParams.get('uuid') || 'ABC6F672-78FF-4122-8902-2D5EAC45772A';
    var orientation = urlParams.get('orientation') || 'landscape';

    // Update iframe src dynamically
    var iframe = document.getElementById('camp_frame');
    iframe.src = "https://samcmsuser.s3.amazonaws.com/camp/" + campId + "/index.html";
    iframe.setAttribute('data-orientation', orientation);
    
    if (orientation === 'portrait') {
        // Adjust breakpoint for portrait if necessary
        iframe.setAttribute('data-breakpoint', '2000'); 
    }

    // Set QR Code URL dynamically
    var qrUrl = "https://www.runsam.com/layouts/rc/" + campId + "/" + uuid;
    if (orientation === 'portrait') {
        qrUrl += "?orientation=portrait";
    }
    var qrCodeElement = document.getElementById("qr-code");
    
    // Generate QR Code
    new QRCode(qrCodeElement, {
        text: qrUrl,
        width: 256, /* High res, CSS scales it down */
        height: 256,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.M
    });

    // Toggle logic
    var toggleBtn = document.getElementById("qr-toggle");
    var qrText = document.getElementById("qr-text");
    var isVisible = true;
    
    toggleBtn.addEventListener('click', function() {
        isVisible = !isVisible;
        if (isVisible) {
            qrCodeElement.classList.remove('hidden');
            qrText.style.display = 'flex';
            toggleBtn.textContent = 'Hide Remote Control';
        } else {
            qrCodeElement.classList.add('hidden');
            qrText.style.display = 'none';
            toggleBtn.textContent = 'Show Remote Control';
        }
        
        // Dispatch resize event to force iframe to recalculate its scale
        // since the qr-container height has changed
        setTimeout(function() {
            window.dispatchEvent(new Event('resize'));
        }, 50);
    });
</script>

<script src="index-fixed.js"></script>
</body>
</html>
